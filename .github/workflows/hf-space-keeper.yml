name: HuggingFace Space Keeper

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch:

jobs:
  keep-space-awake:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Ping HuggingFace Spaces (multi)
        run: |
          # 🔹 Add all your HF Space URLs here
          URLS=(
            "https://phoenixrealhere-nexastreambotlive.hf.space"
            "https://phoenixrealhere-nexastreambotlivepro.hf.space"
            "https://phoenixrealhere-nexastreambotlive02.hf.space"
          )

          MAX_RETRIES=20
          DELAY=15

          echo "Starting HuggingFace Spaces health check..."

          for URL in "${URLS[@]}"
          do
            echo "----------------------------------------"
            echo "Checking: $URL"

            SUCCESS=0

            for ((i=1;i<=MAX_RETRIES;i++))
            do
              echo "Attempt $i"

              STATUS=$(curl \
                -L \
                --connect-timeout 10 \
                --max-time 30 \
                --retry 5 \
                --retry-delay 5 \
                -s \
                -o /dev/null \
                -w "%{http_code}" \
                "$URL?nocache=$(date +%s)")

              echo "HTTP Status: $STATUS"

              if [[ "$STATUS" == "200" || "$STATUS" == "302" ]]; then
                echo "✅ Space responded successfully."
                SUCCESS=1
                break
              fi

              echo "⏳ Not ready. Waiting $DELAY seconds..."
              sleep $DELAY
            done

            if [[ "$SUCCESS" == "0" ]]; then
              echo "❌ Failed to wake: $URL"
            fi
          done

          echo "All spaces checked."
