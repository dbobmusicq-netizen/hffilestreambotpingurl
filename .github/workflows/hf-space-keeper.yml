name: HuggingFace Space Keeper

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch:

jobs:
  keep-space-awake:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Ping HuggingFace Space (robust)
        run: |
          URL="https://phoenixrealhere-nexastreambotlive.hf.space"
          MAX_RETRIES=20
          DELAY=15

          echo "Starting HuggingFace Space health check..."

          for ((i=1;i<=MAX_RETRIES;i++))
          do
            echo "Attempt $i"

            STATUS=$(curl \
              -L \
              --connect-timeout 10 \
              --max-time 30 \
              --retry 5 \
              --retry-delay 5 \
              -s \
              -o /dev/null \
              -w "%{http_code}" \
              "$URL?nocache=$(date +%s)")

            echo "HTTP Status: $STATUS"

            if [[ "$STATUS" == "200" || "$STATUS" == "302" ]]; then
              echo "Space responded successfully."
              exit 0
            fi

            echo "Space not ready yet. Waiting $DELAY seconds..."
            sleep $DELAY
          done

          echo "Space did not respond after $MAX_RETRIES attempts."
          exit 1
